name: Deploy to AWS App Runner (Production)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shepherdwatch-finmodule-fe-prod
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:540871810415:service/shepherdwatch-finmodule-fe-prod/d4b30450d02d4b62a7c0c0f8e2a724de

jobs:
  deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR (Prod)
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🏗️ Building Production Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "📦 Pushing to Production ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

      - name: Deployment Info
        run: |
          echo "================================"
          echo "🚀 Production Deployment Triggered!"
          echo "================================"
          echo "📦 Image: ${{ steps.build-image.outputs.image }}"
          echo "🔗 App URL: https://u7ggp37amb.us-east-1.awsapprunner.com"
          echo "💪 Specs: 4 vCPU, 8 GB RAM"
          echo "🌳 Branch: main"
          echo "🔄 Auto-deploy: Enabled (App Runner will deploy automatically)"
          echo "================================"
          echo ""
          echo "ℹ️ App Runner will automatically detect the new image and deploy it."
          echo "⏱️ Deployment typically takes 3-5 minutes."
          echo "📊 Monitor at: https://console.aws.amazon.com/apprunner/"
